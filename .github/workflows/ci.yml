name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --only-group lint
      - run: uv run --no-sync ruff check .
      - run: uv run --no-sync ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --no-default-groups --group typing --group test --extra kafka --extra metrics
      - run: uv run --no-sync pyright

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - run: uv sync --no-default-groups --group test
      - run: uv run --no-sync pytest -m "not slow and not kafka"

  kafka-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci-kafka')
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - run: uv sync --no-default-groups --group test --extra kafka
      - name: Run kafka-marked tests (exit 5 = none collected yet)
        run: |
          set +e
          uv run --no-sync pytest -m kafka
          rc=$?
          [ "$rc" = "5" ] && exit 0
          exit $rc
