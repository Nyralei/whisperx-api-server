# Distributed (Kafka) mode — API publishes jobs to Kafka, workers consume.
#
# Profiles → modes:
#   cuda          — CUDA worker (api: whisperx-api:kafka,         worker: whisperx-worker:cuda-kafka)
#   cpu           — CPU  worker (api: whisperx-api:kafka,         worker: whisperx-worker:cpu-kafka)
#   cuda-observe  — CUDA worker + Prometheus
#                   (api: whisperx-api:kafka-metrics, worker: whisperx-worker:cuda-kafka-metrics)
#   cpu-observe   — CPU  worker + Prometheus
#                   (api: whisperx-api:kafka-metrics, worker: whisperx-worker:cpu-kafka-metrics)
#
# In Kafka mode the API is a CPU-only router (no model load) regardless of which
# worker compute backend is selected.

x-api-base: &api-base
  build:
    context: .
    dockerfile: Dockerfile.cpu
    args:
      UV_EXTRA_ARGS: "--extra kafka"
  depends_on:
    kafka:
      condition: service_healthy
    minio:
      condition: service_healthy
  command: uvicorn --factory whisperx_api_server.main:create_app
  ports:
    - "8000:8000"
  environment: &api-env
    MODE: kafka
    KAFKA__BOOTSTRAP_SERVERS: kafka:9092
    S3__ENDPOINT_URL: http://minio:9000
    S3__ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
    S3__SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    S3__BUCKET: whisperx-audio
    METRICS_ENABLED: "false"
  volumes:
    - hugging_face_cache:/home/ubuntu/.cache/huggingface
    - torch_cache:/home/ubuntu/.cache/torch
  healthcheck:
    test: ["CMD-SHELL", "curl --fail --connect-timeout 5 http://localhost:8000/healthcheck || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 60s

x-worker-cuda-base: &worker-cuda-base
  build:
    context: .
    dockerfile: Dockerfile.worker-cuda
  depends_on:
    kafka:
      condition: service_healthy
    minio:
      condition: service_healthy
  ports:
    - "9091:9091"
  environment: &worker-env
    MODE: kafka
    KAFKA__BOOTSTRAP_SERVERS: kafka:9092
    S3__ENDPOINT_URL: http://minio:9000
    S3__ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
    S3__SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    S3__BUCKET: whisperx-audio
    METRICS_ENABLED: "false"
  volumes:
    - hugging_face_cache:/home/ubuntu/.cache/huggingface
    - torch_cache:/home/ubuntu/.cache/torch
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

x-worker-cpu-base: &worker-cpu-base
  build:
    context: .
    dockerfile: Dockerfile.worker-cpu
  depends_on:
    kafka:
      condition: service_healthy
    minio:
      condition: service_healthy
  ports:
    - "9091:9091"
  environment: *worker-env
  volumes:
    - hugging_face_cache:/home/ubuntu/.cache/huggingface
    - torch_cache:/home/ubuntu/.cache/torch

x-prometheus: &prometheus-base
  image: prom/prometheus:v3.11.2
  ports:
    - "9090:9090"
  command:
    - '--config.file=/etc/prometheus/prometheus.yml'
    - '--storage.tsdb.path=/prometheus'
  healthcheck:
    test: ["CMD-SHELL", "wget -q -O - http://localhost:9090/-/healthy || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 15s

services:
  kafka:
    image: apache/kafka:4.2.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Default partition count for auto-created topics — set to max expected worker count
      KAFKA_NUM_PARTITIONS: 20
      # Allow larger messages for transcription results (50 MiB)
      KAFKA_MESSAGE_MAX_BYTES: 52428800
      KAFKA_REPLICA_FETCH_MAX_BYTES: 52428800
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  whisperx-api:
    <<: *api-base
    profiles: [cuda, cpu]
    image: whisperx-api:kafka

  whisperx-api-metrics:
    <<: *api-base
    profiles: [cuda-observe, cpu-observe]
    image: whisperx-api:kafka-metrics
    build:
      context: .
      dockerfile: Dockerfile.cpu
      args:
        UV_EXTRA_ARGS: "--extra kafka --extra metrics"
    environment:
      <<: *api-env
      METRICS_ENABLED: "true"

  whisperx-worker-cuda:
    <<: *worker-cuda-base
    profiles: [cuda]
    image: whisperx-worker:cuda-kafka

  whisperx-worker-cpu:
    <<: *worker-cpu-base
    profiles: [cpu]
    image: whisperx-worker:cpu-kafka

  whisperx-worker-cuda-metrics:
    <<: *worker-cuda-base
    profiles: [cuda-observe]
    image: whisperx-worker:cuda-kafka-metrics
    build:
      context: .
      dockerfile: Dockerfile.worker-cuda
      args:
        UV_EXTRA_ARGS: "--extra metrics"
    environment:
      <<: *worker-env
      METRICS_ENABLED: "true"

  whisperx-worker-cpu-metrics:
    <<: *worker-cpu-base
    profiles: [cpu-observe]
    image: whisperx-worker:cpu-kafka-metrics
    build:
      context: .
      dockerfile: Dockerfile.worker-cpu
      args:
        UV_EXTRA_ARGS: "--extra metrics"
    environment:
      <<: *worker-env
      METRICS_ENABLED: "true"

  prometheus-cuda:
    <<: *prometheus-base
    profiles: [cuda-observe]
    volumes:
      - ./monitoring/prometheus/prometheus-kafka-cuda.yml:/etc/prometheus/prometheus.yml:ro

  prometheus-cpu:
    <<: *prometheus-base
    profiles: [cpu-observe]
    volumes:
      - ./monitoring/prometheus/prometheus-kafka-cpu.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  minio_data:
  hugging_face_cache:
  torch_cache:
