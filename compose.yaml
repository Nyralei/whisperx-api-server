# Direct (in-process) mode — no Kafka, no S3.
#
# Profiles → modes:
#   cuda          — Normal CUDA (image: whisperx-api:cuda)
#   cpu           — Normal CPU  (image: whisperx-api:cpu)
#   cuda-observe  — CUDA + Prometheus (image: whisperx-api:cuda-metrics, --extra metrics)
#   cpu-observe   — CPU  + Prometheus (image: whisperx-api:cpu-metrics,  --extra metrics)
#
# Each profile selects exactly one API service with its own image tag, so builds
# don't collide and observability variants don't ship dead code into base images.

x-api-cuda-base: &api-cuda-base
  build:
    context: .
    dockerfile: Dockerfile.cuda
  healthcheck:
    test: ["CMD-SHELL", "curl --fail --connect-timeout 5 http://localhost:8000/healthcheck || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s
  command: uvicorn --factory whisperx_api_server.main:create_app
  ports:
    - "8000:8000"
  volumes:
    - hugging_face_cache:/home/ubuntu/.cache/huggingface
    - torch_cache:/home/ubuntu/.cache/torch
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

x-api-cpu-base: &api-cpu-base
  build:
    context: .
    dockerfile: Dockerfile.cpu
  healthcheck:
    test: ["CMD-SHELL", "curl --fail --connect-timeout 5 http://localhost:8000/healthcheck || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s
  command: uvicorn --factory whisperx_api_server.main:create_app
  ports:
    - "8000:8000"
  volumes:
    - hugging_face_cache:/home/ubuntu/.cache/huggingface
    - torch_cache:/home/ubuntu/.cache/torch

x-prometheus: &prometheus-base
  image: prom/prometheus:v3.11.2
  ports:
    - "9090:9090"
  command:
    - '--config.file=/etc/prometheus/prometheus.yml'
    - '--storage.tsdb.path=/prometheus'
  healthcheck:
    test: ["CMD-SHELL", "wget -q -O - http://localhost:9090/-/healthy || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 15s

services:
  whisperx-api-cuda:
    <<: *api-cuda-base
    profiles: [cuda]
    image: whisperx-api:cuda

  whisperx-api-cpu:
    <<: *api-cpu-base
    profiles: [cpu]
    image: whisperx-api:cpu

  whisperx-api-cuda-metrics:
    <<: *api-cuda-base
    profiles: [cuda-observe]
    image: whisperx-api:cuda-metrics
    build:
      context: .
      dockerfile: Dockerfile.cuda
      args:
        UV_EXTRA_ARGS: "--extra metrics"
    environment:
      METRICS_ENABLED: "true"

  whisperx-api-cpu-metrics:
    <<: *api-cpu-base
    profiles: [cpu-observe]
    image: whisperx-api:cpu-metrics
    build:
      context: .
      dockerfile: Dockerfile.cpu
      args:
        UV_EXTRA_ARGS: "--extra metrics"
    environment:
      METRICS_ENABLED: "true"

  prometheus-cuda:
    <<: *prometheus-base
    profiles: [cuda-observe]
    volumes:
      - ./monitoring/prometheus/prometheus-cuda.yml:/etc/prometheus/prometheus.yml:ro

  prometheus-cpu:
    <<: *prometheus-base
    profiles: [cpu-observe]
    volumes:
      - ./monitoring/prometheus/prometheus-cpu.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  hugging_face_cache:
  torch_cache:
